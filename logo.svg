<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1f4e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="moonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c9a84c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0d060;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c9a84c;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#f0d060;stop-opacity:0" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="200" fill="url(#bgGrad)"/>

  <!-- Stars -->
  <circle cx="75" cy="85" r="2" fill="#ffffff" opacity="0.6"/>
  <circle cx="325" cy="95" r="1.5" fill="#ffffff" opacity="0.4"/>
  <circle cx="55" cy="200" r="1.8" fill="#ffffff" opacity="0.5"/>
  <circle cx="345" cy="180" r="1.3" fill="#ffffff" opacity="0.3"/>
  <circle cx="95" cy="145" r="1.2" fill="#ffffff" opacity="0.4"/>
  <circle cx="300" cy="75" r="1.8" fill="#ffffff" opacity="0.5"/>
  <circle cx="155" cy="55" r="1.5" fill="#ffffff" opacity="0.3"/>
  <circle cx="260" cy="320" r="1.2" fill="#ffffff" opacity="0.4"/>
  <circle cx="65" cy="290" r="1.5" fill="#ffffff" opacity="0.3"/>
  <circle cx="340" cy="270" r="1.5" fill="#ffffff" opacity="0.4"/>
  <circle cx="130" cy="330" r="1" fill="#ffffff" opacity="0.3"/>
  <circle cx="310" cy="310" r="1.3" fill="#ffffff" opacity="0.35"/>

  <!-- Moon glow -->
  <circle cx="200" cy="185" r="95" fill="url(#glowGrad)"/>

  <!-- Larger crescent moon centered -->
  <circle cx="195" cy="178" r="72" fill="url(#moonGrad)"/>
  <circle cx="225" cy="158" r="58" fill="url(#bgGrad)"/>

  <!-- Gear teeth -->
  <g fill="none" stroke="#c9a84c" stroke-width="3" opacity="0.5" stroke-linecap="round">
    <line x1="195" y1="90" x2="195" y2="100"/>
    <line x1="237" y1="97" x2="233" y2="107"/>
    <line x1="271" y1="120" x2="263" y2="127"/>
    <line x1="287" y1="156" x2="277" y2="158"/>
    <line x1="287" y1="200" x2="277" y2="198"/>
    <line x1="271" y1="236" x2="263" y2="229"/>
    <line x1="237" y1="259" x2="233" y2="249"/>
    <line x1="195" y1="266" x2="195" y2="256"/>
    <line x1="153" y1="259" x2="157" y2="249"/>
    <line x1="119" y1="236" x2="127" y2="229"/>
    <line x1="103" y1="200" x2="113" y2="198"/>
    <line x1="103" y1="156" x2="113" y2="158"/>
    <line x1="119" y1="120" x2="127" y2="127"/>
    <line x1="153" y1="97" x2="157" y2="107"/>
  </g>

  <!-- Small "N" lettermark at bottom -->
  <text x="200" y="340" font-family="Arial,Helvetica,sans-serif" font-size="28" font-weight="bold" fill="#c9a84c" text-anchor="middle" opacity="0.8">N</text>
</svg>
